<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechZy Login</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="">

<header class="bg-white sticky top-0 px-5 z-50">

  <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">
    <h1 class="text-cyan-700 text-xl font-extrabold md:text-3xl"><a href="/">TechZy</a></h1>
    <div class="hidden md:flex gap-5 text-xl font-semibold">
      <a href="">Home</a>
      <a href="#">Shop</a>
      <a href="#">Collections</a>
      <a href="#">Deals</a>
    </div>

    <div class="flex items-center justify-center w-1/4 relative hidden lg:block">
      <input class="border rounded-2xl border-cyan-700 px-5 py-2 w-full" placeholder="Search for products...">
      <i class="fa-solid fa-magnifying-glass text-xl absolute right-4 top-2.5 cursor-pointer"></i>
    </div>
    
    <div class="hidden md:block lg:hidden"><i class="fa-solid fa-magnifying-glass"></i></div>
    
    
    <div class="flex gap-4">
      <a href="product.html"><button class="bg-white px-5 py-2 rounded-2xl text-xl font-semibold cursor-pointer sm:block"> <i class="fa-solid fa-cart-arrow-down"></i> Cart (0)</button></a>
      <a href="login.html"><button class="bg-cyan-500 text-white py-2 px-3 rounded-xl md:text-lg sm:text-md text-sm cursor-pointer">Login</button></a>
    </div>

    <!-- MOBILE MENU -->
    <aside class="md:hidden relative">
        <button onclick="asideOnOff()"><i class="fa-solid fa-bars cursor-pointer text-2xl"></i></button>

      <!-- MOBILE DROPDOWN -->
      <div id="asideMenu" class="hidden absolute right-0 mt-4 w-60 bg-white rounded-2xl shadow-xl p-5 flex flex-col gap-4 text-lg font-semibold cursor-pointer">
        
        <button class="bg-white px-5 py-2 rounded-2xl text-xl font-semibold cursor-pointer sm:hidden"> <i class="fa-solid fa-cart-arrow-down"></i> Cart (0)</button>
        <a href="">Home</a>
        <a href="#">Shop</a>
        <a href="#">Collections</a>
        <a href="#">Deals</a>

        <input class="border rounded-2xl border-cyan-500 px-4 py-2 w-full mt-2"
               placeholder="Search for products...">

      </div>
    </aside>
  </div>
</header>


    <section class="bg-gradient-to-br from-cyan-100 to-gray-200 flex items-center justify-center py-5">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md py-5 px-10">

        <!-- LOGO -->

        <h2 class="text-xl font-bold mb-5 text-center">
        Welcome Back
        </h2>

        <form onsubmit="login(event)" class="space-y-6">

                <!-- EMAIL -->
            <div>
                <label class="font-semibold">Email Address</label>
                <input id="email" name="email" type="email" placeholder="Enter your email" required class="w-full mt-2 border rounded-xl px-5 py-2 focus:outline-cyan-500">
            </div>

                <!-- PASSWORD -->
            <div>
                <label class="font-semibold">Password</label>

                <div class="relative mt-2">
                    <input id="password" name="password" type="text" placeholder="Enter your password" required class="w-full border rounded-xl px-5 py-2 pr-12 focus:outline-cyan-500">

                    <button onclick="passwordVisible()" class="absolute right-4 top-3 text-gray-500"><i class="fa-solid fa-eye"></i></button>
                </div>

            </div>

                <!-- OPTIONS -->
            <div class="flex justify-between items-center text-sm">
                <label class="flex items-center gap-2"><input type="checkbox">Remember me</label>

                <a href="#" class="text-cyan-600 font-semibold">
                Forgot Password?
                </a>
            </div>

                <!-- LOGIN BUTTON -->
            <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white py-4 rounded-2xl font-bold text-lg">Login</button>

        </form>

            <!-- DIVIDER -->
        <div class="flex items-center gap-4 my-6">
            <hr class="flex-1">
            <span class="text-gray-400 text-sm">OR</span>
            <hr class="flex-1">
        </div>

            <!-- SOCIAL LOGIN -->
        <div class="flex gap-4">

            <button class="flex-1 border py-3 rounded-xl font-semibold hover:bg-gray-50"><i class="fa-brands fa-google mr-2"></i>Google</button>
            <button class="flex-1 border py-3 rounded-xl font-semibold hover:bg-gray-50"><i class="fa-brands fa-facebook text-blue-600 mr-2"></i>Facebook</button>

        </div>

            <!-- SIGN UP -->
        <p class="text-center text-sm mt-8">
        Don't have an account?
        <a href="signup.html" class="text-cyan-600 font-semibold">Sign Up</a>
        </p>

    </div>
    </section>


    <script>
        function asideOnOff(){
            const asideMenu = document.getElementById('asideMenu');
            asideMenu.classList.toggle('hidden');
        }

        function passwordVisible() {
            const password = document.getElementById("password");
            if (password.type === "text") {
                password.type = "password";
            } else {
                password.type = "text";
            }
        }
        passwordVisible();

        function login(e){
            e.preventDefault();
            const formData = e.target;
            const email = formData.email.value;
            const password = formData.password.value;

            if(email=="sanjoy@gmail.com" && password=="12345"){
                console.log(email);
                console.log(password);
                window.location.replace("sellerDashboard.html")
            }

        }
    </script>

</body>
</html>
